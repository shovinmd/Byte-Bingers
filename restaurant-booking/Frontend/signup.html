<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Byte-Bingers Culinary Concierge</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    body {
      background-color: var(--bg-obsidian);
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      overflow: hidden;
    }

    /* Split layout */
    .split-layout-container {
      display: flex;
      width: 100%;
      min-height: 100vh;
    }

    /* Visual Half (Left) */
    .visual-half {
      flex: 1.2;
      background: linear-gradient(rgba(11, 12, 16, 0.45), rgba(11, 12, 16, 0.85)), 
                  url('https://images.unsplash.com/photo-1414235077428-338989a2e8c0?q=80&w=1200&auto=format&fit=crop') no-repeat center center/cover;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 5rem;
      position: relative;
    }

    @media (max-width: 900px) {
      .visual-half {
        display: none;
      }
    }

    .chef-quote-carousel {
      max-width: 500px;
    }

    .chef-quote-text {
      font-family: var(--font-serif);
      font-size: 2.2rem;
      font-style: italic;
      color: #FFF;
      line-height: 1.3;
      margin-bottom: 1.5rem;
      opacity: 0;
      transition: opacity 1s ease-in-out;
      text-shadow: 0 4px 15px rgba(0, 0, 0, 0.8);
    }

    .chef-quote-author {
      font-family: var(--font-sans);
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 2px;
      color: var(--accent-amber-start);
      font-weight: 600;
      opacity: 0;
      transition: opacity 1s ease-in-out;
      text-shadow: 0 2px 5px rgba(0, 0, 0, 0.8);
    }

    /* Form Half (Right) */
    .form-half {
      flex: 0.8;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 3rem;
      position: relative;
      background: linear-gradient(135deg, rgba(25, 26, 30, 0.7), rgba(11, 12, 16, 0.95));
    }

    @media (max-width: 900px) {
      .form-half {
        flex: 1;
        padding: 2rem;
      }
    }

    .auth-card {
      width: 100%;
      max-width: 400px;
      padding: 2.5rem 3rem;
    }

    @media (max-width: 480px) {
      .auth-card {
        padding: 2rem;
      }
    }

    .auth-logo-row {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-logo-row h2 {
      font-family: var(--font-serif);
      font-size: 2.2rem;
      margin-top: 0.5rem;
    }

    .auth-subtitle {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-top: 0.5rem;
    }

    .input-wrapper {
      position: relative;
      margin-bottom: 1.5rem;
    }

    .input-wrapper input {
      border: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      background: transparent;
      border-radius: 0;
      padding: 0.6rem 0;
      width: 100%;
      color: var(--text-primary);
      font-size: 1rem;
      transition: border-color 0.3s;
    }

    .input-wrapper input:focus {
      outline: none;
      border-color: var(--accent-amber-start);
      box-shadow: none;
    }

    .input-wrapper label {
      position: absolute;
      top: 0.6rem;
      left: 0;
      color: var(--text-secondary);
      font-size: 0.95rem;
      transition: all 0.3s ease;
      pointer-events: none;
    }

    .input-wrapper input:focus ~ label,
    .input-wrapper input:valid ~ label {
      top: -15px;
      font-size: 0.75rem;
      color: var(--accent-amber-start);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .auth-footer-links {
      text-align: center;
      margin-top: 1.8rem;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>

  <div class="split-layout-container">
    
    <!-- Left Visual Column with Quote Fader -->
    <div class="visual-half">
      <div class="chef-quote-carousel">
        <p class="chef-quote-text" id="quote-display-text">"To eat is a necessity, but to eat intelligently is an art."</p>
        <span class="chef-quote-author" id="quote-display-author">— François de La Rochefoucauld</span>
      </div>
    </div>

    <!-- Right Form Column -->
    <div class="form-half">
      <!-- Navbar back link -->
      <a href="index.html" style="position: absolute; top: 2rem; left: 2rem; font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 6px;">
        ➔ Back to Discovery
      </a>

      <div class="card-premium auth-card animate-fade-slide">
        
        <div class="auth-logo-row">
          <span class="indicator-dot"></span>
          <h2>Register</h2>
          <p class="auth-subtitle">Create your culinary profile</p>
        </div>

        <form id="signupForm">
          <div class="input-wrapper">
            <input type="text" id="name" required autocomplete="name">
            <label for="name">Signature Full Name</label>
          </div>

          <div class="input-wrapper">
            <input type="email" id="email" required autocomplete="email">
            <label for="email">Email Address</label>
          </div>

          <div class="input-wrapper">
            <input type="password" id="password" required autocomplete="new-password">
            <label for="password">Security Password</label>
          </div>

          <div class="input-wrapper">
            <input type="password" id="confirmPassword" required autocomplete="new-password">
            <label for="confirmPassword">Confirm Password</label>
          </div>

          <button type="submit" class="btn-gradient btn-liquid" style="width: 100%; padding: 1rem 0; margin-top: 1rem;">
            Create Account
          </button>
        </form>

        <div class="auth-footer-links">
          Already registered? <a href="login.html" style="font-weight: 600;">Sign In</a>
        </div>

      </div>
    </div>

  </div>

  <!-- Firebase Compatibility SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <script>
    // Chef quotes fader database
    const QUOTES = [
      { text: '"To eat is a necessity, but to eat intelligently is an art."', author: '— François de La Rochefoucauld' },
      { text: '"No one is born a great cook, one learns by doing."', author: '— Julia Child' },
      { text: '"Good food is the foundation of genuine happiness."', author: '— Auguste Escoffier' }
    ];

    let currentQuoteIdx = 0;
    const quoteTextEl = document.getElementById('quote-display-text');
    const quoteAuthorEl = document.getElementById('quote-display-author');

    // Trigger initial show
    setTimeout(() => {
      quoteTextEl.style.opacity = '1';
      quoteAuthorEl.style.opacity = '1';
    }, 100);

    setInterval(() => {
      // Fade out
      quoteTextEl.style.opacity = '0';
      quoteAuthorEl.style.opacity = '0';
      
      setTimeout(() => {
        currentQuoteIdx = (currentQuoteIdx + 1) % QUOTES.length;
        quoteTextEl.textContent = QUOTES[currentQuoteIdx].text;
        quoteAuthorEl.textContent = QUOTES[currentQuoteIdx].author;
        
        // Fade in
        quoteTextEl.style.opacity = '1';
        quoteAuthorEl.style.opacity = '1';
      }, 1000);
    }, 6000);

    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDwU841TMq6ys7eBUezVmASIzUzsWk95qY",
      authDomain: "byte-bingers.firebaseapp.com",
      projectId: "byte-bingers",
      storageBucket: "byte-bingers.firebasestorage.app",
      messagingSenderId: "83166456639",
      appId: "1:83166456639:web:d64ecb65deb3fc2a21c18a"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Form submission
    document.getElementById("signupForm").addEventListener("submit", async function(event) {
      event.preventDefault();
      
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      
      if (password !== confirmPassword) {
        alert("Passwords do not match!");
        return;
      }
      
      try {
        // Register in Firebase Auth
        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        const user = userCredential.user;

        // Try syncing with backend database
        try {
          const syncResponse = await fetch("https://byte-bingers-k5ns.vercel.app/api/auth/firebase-sync", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name,
              email,
              firebaseUid: user.uid
            })
          });

          if (syncResponse.ok) {
            alert("Profile successfully registered! Redirecting to sign in desk...");
            window.location.href = "login.html";
            return;
          } else {
            const data = await syncResponse.json();
            alert("Firebase registered, but database sync failed: " + (data.error || "Unknown error"));
          }
        } catch (syncErr) {
          console.log("Database connection offline. Proceeding with client validation fallback.", syncErr);
          alert("Profile successfully registered (Offline Fallback)! Redirecting to sign in desk...");
          window.location.href = "login.html";
        }
      } catch (authErr) {
        alert("Registration Error: " + authErr.message);
      }
    });
  </script>
</body>
</html>
